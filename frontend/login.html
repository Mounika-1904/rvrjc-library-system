<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RVR & JC LMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top fixed-bg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="logo-top">RVR & JC College of Engineering</span>
                <span class="logo-bottom">LEARNING HUB</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="books.html">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="membership.html">Join Us</a></li>
                    <li class="nav-item ms-lg-3"><a class="nav-link btn-login" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card border-0 shadow-lg p-4 animate-up">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="icon-box mx-auto mb-3"
                        style="width: 64px; height: 64px; background: rgba(251, 191, 36, 0.1); color: var(--accent-gold);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                    </div>
                    <h2 class="fw-bold mb-1" style="color: var(--primary-blue);">Welcome Back</h2>
                    <p class="text-muted small">Enter your register number to access the portal</p>
                </div>

                <form id="loginForm">
                    <div class="form-group mb-3">
                        <label class="form-label small fw-bold text-slate-600">Unique ID / Register Number</label>
                        <input type="text" name="uniqueId" class="form-control bg-light" placeholder="e.g. Y23CD122"
                            required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label small fw-bold text-slate-600">Your Role</label>
                        <select name="role" class="form-select bg-light" required>
                            <option value="" disabled selected>Select your role</option>
                            <option value="student">Student</option>
                            <option value="lecturer">Lecturer</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label small fw-bold text-slate-600">Password</label>
                        <input type="password" name="password" class="form-control bg-light" placeholder="••••••••"
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold text-uppercase letter-spacing-1">
                        Sign In to Library
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="small text-muted mb-2">Forgot your password? <a href="#" data-bs-toggle="modal"
                            data-bs-target="#forgotPasswordModal" class="text-decoration-none fw-bold"
                            style="color: var(--primary-blue);">Reset Here</a>
                    </p>
                    <p class="small text-muted mb-0">Don't have an account? <a href="membership.html"
                            class="text-decoration-none fw-bold" style="color: var(--primary-blue);">Register Here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" style="color: var(--primary-blue);">Reset Password</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3 pb-4">
                    <form id="forgotPasswordForm">
                        <div class="form-group mb-3">
                            <label class="form-label small fw-bold text-slate-600">Unique ID</label>
                            <input type="text" name="resetId" class="form-control bg-light" placeholder="e.g. Y23CD122"
                                required>
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label small fw-bold text-slate-600">Email Address</label>
                            <input type="email" name="resetEmail" class="form-control bg-light"
                                placeholder="For verification" required>
                        </div>
                        <div class="form-group mb-4">
                            <label class="form-label small fw-bold text-slate-600">New Password</label>
                            <input type="password" name="resetPassword" class="form-control bg-light" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold letter-spacing-1">Reset
                            Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Common UX Components -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0"></div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-border spinner-custom" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
